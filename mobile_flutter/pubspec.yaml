name: curio_app
description: A marketplace for Egyptian artisans.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  go_router: ^17.2.2
  cached_network_image: ^3.4.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
